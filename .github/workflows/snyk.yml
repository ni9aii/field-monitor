name: Security Audit (Snyk)

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * *' # Daily 4AM UTC
  workflow_dispatch: # Manual trigger

jobs:
  snyk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Snyk CLI
        run: npm install -g snyk
      - name: Run Snyk open source vulnerability test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=Cargo.lock --org=${{ secrets.SNYK_ORG }} || true
      - name: Run Snyk code security test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk code test --org=${{ secrets.SNYK_ORG }} || true