name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test
      - run: cargo test --release

  integration:
    name: integration (example configs)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: integration
      - name: Build binary
        run: cargo build --release
      - name: Smoke-test CLI against example configs (no private data, no network to servers)
        run: |
          cp config.example.toml config.toml
          cp targets.example.toml targets.toml
          echo "--- list-servers (parses example config) ---"
          ./target/release/field-monitor list-servers
          echo "--- probe (local measurement, needs FIELD_PROBE_IP) ---"
          FIELD_PROBE_IP=example.com ./target/release/field-monitor probe
          rm -f config.toml targets.toml

  build:
    name: build (${{ matrix.os }} ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: "" # native build without --target
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.target }}
      - name: Build
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo build --release --target "${{ matrix.target }}"
          else
            cargo build --release
          fi

  # Native aarch64 build inside a Debian bookworm container (the same as on
  # the target ARM64 SBC). Instead of cross-compiling with an apt linker, this
  # is a genuine native environment: the binary links against the native
  # aarch64 glibc and is compatible with the SBC out of the box. The x86_64
  # runner runs the arm64 image via QEMU.
  native-aarch64:
    name: native-build+test (aarch64 / Debian bookworm)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v4

      - name: Build + test inside aarch64 Debian bookworm container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/src" -w /src \
            arm64v8/rust:1-bookworm \
            bash -c "cargo build --release --target aarch64-unknown-linux-gnu && \
                     cargo test --release --target aarch64-unknown-linux-gnu"

      - name: Upload aarch64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: field-monitor-aarch64
          path: target/aarch64-unknown-linux-gnu/release/field-monitor
          if-no-files-found: error
